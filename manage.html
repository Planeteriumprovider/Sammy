<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sammy Admin - Galerie Verwalten</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #f39c12;
            --secondary-color: #e67e22;
            --bg-color: #fdfcf5;
            --text-color: #4a3c28;
            --card-bg: #ffffff;
            --accent-color: #2ecc71;
            --danger-color: #e74c3c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .admin-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 24px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(243, 156, 18, 0.2);
        }

        h1 {
            color: var(--secondary-color);
            font-size: 1.8em;
            margin-bottom: 20px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s ease;
        }

        input[type="password"]:focus,
        input[type="text"]:focus {
            border-color: var(--primary-color);
        }

        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 10px;
            font-family: inherit;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s ease, transform 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            width: 100%;
            padding: 12px;
            font-size: 1em;
            justify-content: center;
            margin-bottom: 20px;
        }

        .btn-danger {
            background: var(--danger-color);
            color: white;
        }

        .btn-rename {
            background: var(--primary-color);
            color: white;
        }

        .btn-secondary {
            background: #ccc;
            color: #333;
        }

        .file-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }

        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            border: 1px solid #eee;
            border-radius: 14px;
            background: #fafafa;
            gap: 15px;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .file-info {
            display: flex;
            align-items: center;
            gap: 12px;
            overflow: hidden;
        }

        .file-thumb {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 8px;
            background: #eee;
            flex-shrink: 0;
        }

        .file-name {
            font-weight: 600;
            word-break: break-all;
            font-size: 0.95em;
        }

        .file-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .status-msg {
            margin-top: 15px;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.9em;
            text-align: center;
            display: none;
        }

        .status-msg.success {
            display: block;
            background: rgba(46, 204, 113, 0.15);
            color: #27ae60;
        }

        .status-msg.error {
            display: block;
            background: rgba(231, 76, 60, 0.15);
            color: var(--danger-color);
        }

        .custom-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            padding: 20px;
            backdrop-filter: blur(3px);
        }

        .custom-modal-overlay.active {
            display: flex;
        }

        .custom-modal {
            background: white;
            padding: 25px;
            border-radius: 20px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        .custom-modal h3 {
            margin-bottom: 15px;
            color: var(--secondary-color);
        }

        .custom-modal p {
            margin-bottom: 20px;
            font-size: 0.95em;
            word-break: break-all;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .modal-buttons .btn {
            flex: 1;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div class="admin-card">
        <h1><i class="fas fa-folder-open"></i> Sammy Galerie Verwalten</h1>

        <div class="form-group">
            <label for="gh-token">GitHub Token</label>
            <input type="password" id="gh-token" placeholder="Token hier eintragen">
        </div>

        <button class="btn btn-primary" id="load-btn"><i class="fas fa-sync"></i> Bilder laden</button>

        <div class="status-msg" id="status"></div>

        <div class="file-list" id="file-list"></div>
    </div>

    <div class="custom-modal-overlay" id="custom-modal">
        <div class="custom-modal">
            <h3 id="modal-title">Bestätigen</h3>
            <p id="modal-text"></p>
            <div class="form-group" id="modal-input-group" style="display: none;">
                <input type="text" id="modal-input">
            </div>
            <div class="modal-buttons">
                <button class="btn btn-secondary" id="modal-cancel">Abbrechen</button>
                <button class="btn btn-primary" id="modal-confirm">Bestätigen</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const owner = 'planeteriumprovider';
            const repo = 'Sammy';
            const folder = 'Sammy_Assets';

            const tokenInput = document.getElementById('gh-token');
            const loadBtn = document.getElementById('load-btn');
            const fileList = document.getElementById('file-list');
            const status = document.getElementById('status');

            const modal = document.getElementById('custom-modal');
            const modalTitle = document.getElementById('modal-title');
            const modalText = document.getElementById('modal-text');
            const modalInputGroup = document.getElementById('modal-input-group');
            const modalInput = document.getElementById('modal-input');
            const modalCancel = document.getElementById('modal-cancel');
            const modalConfirm = document.getElementById('modal-confirm');

            let onConfirmCallback = null;

            const savedToken = localStorage.getItem('sammy_token');
            if (savedToken) {
                tokenInput.value = savedToken;
            }

            tokenInput.addEventListener('input', () => {
                localStorage.setItem('sammy_token', tokenInput.value.trim());
            });

            function showStatus(text, type) {
                status.className = 'status-msg ' + type;
                status.innerText = text;
                status.style.display = 'block';
            }

            function openModal(title, text, isInput, defaultValue, callback) {
                modalTitle.innerText = title;
                modalText.innerText = text;
                if (isInput) {
                    modalInputGroup.style.display = 'block';
                    modalInput.value = defaultValue || '';
                } else {
                    modalInputGroup.style.display = 'none';
                }
                onConfirmCallback = callback;
                modal.classList.add('active');
            }

            function closeModal() {
                modal.classList.remove('active');
                onConfirmCallback = null;
            }

            modalCancel.addEventListener('click', closeModal);
            modalConfirm.addEventListener('click', () => {
                if (onConfirmCallback) {
                    const val = modalInputGroup.style.display === 'block' ? modalInput.value.trim() : true;
                    onConfirmCallback(val);
                }
                closeModal();
            });

            async function loadImages() {
                const token = tokenInput.value.trim();
                if (!token) {
                    showStatus('Bitte erst den GitHub Token eintragen!', 'error');
                    return;
                }

                showStatus('Lade Bilder...', 'success');
                fileList.innerHTML = '';

                try {
                    const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${encodeURIComponent(folder)}`, {
                        headers: { 
                            'Authorization': `token ${token}`,
                            'Accept': 'application/vnd.github.v3+json'
                        }
                    });

                    if (!res.ok) {
                        const errData = await res.json().catch(() => ({}));
                        throw new Error(errData.message || 'Fehler beim Laden.');
                    }

                    const files = await res.json();
                    const validExts = ['.jpg', '.jpeg', '.png', '.webp', '.gif'];
                    const images = files.filter(f => f.type === 'file' && validExts.some(ext => f.name.toLowerCase().endsWith(ext)));

                    status.style.display = 'none';

                    if (images.length === 0) {
                        showStatus('Keine Bilder im Ordner gefunden.', 'error');
                        return;
                    }

                    images.forEach(file => {
                        const item = document.createElement('div');
                        item.className = 'file-item';
                        item.id = 'file-row-' + btoa(file.name).replace(/=/g, '');

                        const fileInfo = document.createElement('div');
                        fileInfo.className = 'file-info';

                        const img = document.createElement('img');
                        img.className = 'file-thumb';
                        img.src = file.download_url;
                        img.alt = '';

                        const nameSpan = document.createElement('span');
                        nameSpan.className = 'file-name';
                        nameSpan.innerText = file.name;

                        fileInfo.appendChild(img);
                        fileInfo.appendChild(nameSpan);

                        const fileActions = document.createElement('div');
                        fileActions.className = 'file-actions';

                        const renameBtn = document.createElement('button');
                        renameBtn.className = 'btn btn-rename';
                        renameBtn.innerHTML = '<i class="fas fa-pen"></i>';
                        renameBtn.addEventListener('click', () => renameFile(file.name, file.sha));

                        const deleteBtn = document.createElement('button');
                        deleteBtn.className = 'btn btn-danger';
                        deleteBtn.innerHTML = '<i class="fas fa-trash"></i>';
                        deleteBtn.addEventListener('click', () => deleteFile(file.name, file.sha));

                        fileActions.appendChild(renameBtn);
                        fileActions.appendChild(deleteBtn);

                        item.appendChild(fileInfo);
                        item.appendChild(fileActions);

                        fileList.appendChild(item);
                    });

                } catch (err) {
                    showStatus(err.message, 'error');
                }
            }

            function deleteFile(fileName, sha) {
                const token = tokenInput.value.trim();

                openModal('Bild löschen', `Möchtest du "${fileName}" wirklich unwiderruflich löschen?`, false, null, async (confirmed) => {
                    if (!confirmed) return;

                    showStatus(`Lösche ${fileName}...`, 'success');

                    try {
                        const filePath = `${folder}/${fileName}`;
                        const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${filePath.split('/').map(encodeURIComponent).join('/')}`, {
                            method: 'DELETE',
                            headers: {
                                'Authorization': `token ${token}`,
                                'Content-Type': 'application/json',
                                'Accept': 'application/vnd.github.v3+json'
                            },
                            body: JSON.stringify({
                                message: `Delete ${fileName}`,
                                sha: sha
                            })
                        });

                        if (res.ok) {
                            showStatus(`"${fileName}" gelöscht!`, 'success');
                            const row = document.getElementById('file-row-' + btoa(fileName).replace(/=/g, ''));
                            if (row) {
                                row.style.opacity = '0';
                                row.style.transform = 'scale(0.9)';
                                setTimeout(() => row.remove(), 300);
                            }
                        } else {
                            const errData = await res.json().catch(() => ({}));
                            showStatus(`Löschen fehlgeschlagen: ${errData.message || res.statusText}`, 'error');
                        }
                    } catch (err) {
                        showStatus('Fehler beim Löschen!', 'error');
                    }
                });
            }

            function renameFile(oldName, sha) {
                const token = tokenInput.value.trim();

                openModal('Bild umbenennen', 'Gib den neuen Dateinamen ein:', true, oldName, async (newName) => {
                    if (!newName || newName === oldName) return;

                    showStatus(`Umbenennen gestartet...`, 'success');

                    try {
                        const oldPath = `${folder}/${oldName}`;
                        const getRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${oldPath.split('/').map(encodeURIComponent).join('/')}`, {
                            headers: {
                                'Authorization': `token ${token}`,
                                'Accept': 'application/vnd.github.v3+json'
                            }
                        });

                        if (!getRes.ok) throw new Error('Konnte Datei-Inhalt nicht laden.');

                        const fileData = await getRes.json();
                        const base64Content = fileData.content.replace(/\n/g, '');

                        const newPath = `${folder}/${newName}`;
                        const createRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${newPath.split('/').map(encodeURIComponent).join('/')}`, {
                            method: 'PUT',
                            headers: {
                                'Authorization': `token ${token}`,
                                'Content-Type': 'application/json',
                                'Accept': 'application/vnd.github.v3+json'
                            },
                            body: JSON.stringify({
                                message: `Rename ${oldName} to ${newName}`,
                                content: base64Content
                            })
                        });

                        if (!createRes.ok) {
                            const errData = await createRes.json().catch(() => ({}));
                            throw new Error(`Erstellen fehlgeschlagen: ${errData.message || createRes.statusText}`);
                        }

                        await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${oldPath.split('/').map(encodeURIComponent).join('/')}`, {
                            method: 'DELETE',
                            headers: {
                                'Authorization': `token ${token}`,
                                'Content-Type': 'application/json',
                                'Accept': 'application/vnd.github.v3+json'
                            },
                            body: JSON.stringify({
                                message: `Remove old file ${oldName}`,
                                sha: sha
                            })
                        });

                        showStatus(`In "${newName}" umbenannt!`, 'success');

                        const row = document.getElementById('file-row-' + btoa(oldName).replace(/=/g, ''));
                        if (row) {
                            row.id = 'file-row-' + btoa(newName).replace(/=/g, '');
                            const nameSpan = row.querySelector('.file-name');
                            if (nameSpan) nameSpan.innerText = newName;
                        }

                    } catch (err) {
                        showStatus(err.message, 'error');
                    }
                });
            }

            loadBtn.addEventListener('click', loadImages);

            if (savedToken) {
                loadImages();
            }
        })();
    </script>
</body>
</html>
