<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sammy Admin - Galerie Upload</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #f39c12;
            --secondary-color: #e67e22;
            --bg-color: #fdfcf5;
            --text-color: #4a3c28;
            --card-bg: #ffffff;
            --accent-color: #2ecc71;
            --danger-color: #e74c3c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .upload-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 24px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(243, 156, 18, 0.2);
        }

        h1 {
            color: var(--secondary-color);
            font-size: 1.8em;
            margin-bottom: 20px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s ease;
        }

        input[type="password"]:focus,
        input[type="text"]:focus {
            border-color: var(--primary-color);
        }

        .file-dropzone {
            border: 2px dashed var(--primary-color);
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            background: rgba(243, 156, 18, 0.05);
            cursor: pointer;
            transition: background 0.2s ease;
            margin-bottom: 20px;
        }

        .file-dropzone:hover {
            background: rgba(243, 156, 18, 0.1);
        }

        .file-dropzone i {
            font-size: 2.5em;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        input[type="file"] {
            display: none;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            font-family: inherit;
            font-weight: 700;
            font-size: 1em;
            cursor: pointer;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .btn:hover {
            opacity: 0.95;
            transform: translateY(-2px);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .preview-list {
            margin-bottom: 20px;
            font-size: 0.9em;
            max-height: 150px;
            overflow-y: auto;
        }

        .preview-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px border-bottom: 1px dashed #eee;
        }

        .status-msg {
            margin-top: 15px;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.9em;
            text-align: center;
            display: none;
        }

        .status-msg.success {
            display: block;
            background: rgba(46, 204, 113, 0.15);
            color: #27ae60;
        }

        .status-msg.error {
            display: block;
            background: rgba(231, 76, 60, 0.15);
            color: var(--danger-color);
        }
    </style>
</head>
<body>

    <div class="upload-card">
        <h1><i class="fas fa-user-shield"></i> Sammy Admin</h1>

        <div class="form-group">
            <label for="gh-token">GitHub Access Token</label>
            <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxx">
        </div>

        <div class="file-dropzone" id="dropzone">
            <i class="fas fa-cloud-arrow-up"></i>
            <p><strong>Bilder auswählen</strong> oder hierher ziehen</p>
            <input type="file" id="file-input" multiple accept="image/*">
        </div>

        <div class="preview-list" id="preview-list"></div>

        <button class="btn" id="upload-btn" disabled>Bilder hochladen</button>

        <div class="status-msg" id="status"></div>
    </div>

    <script>
        (function() {
            const owner = 'planeteriumprovider';
            const repo = 'Sammy';
            const folder = 'Sammy_Assets';

            const tokenInput = document.getElementById('gh-token');
            const dropzone = document.getElementById('dropzone');
            const fileInput = document.getElementById('file-input');
            const previewList = document.getElementById('preview-list');
            const uploadBtn = document.getElementById('upload-btn');
            const status = document.getElementById('status');

            let selectedFiles = [];

            const savedToken = localStorage.getItem('sammy_gh_token');
            if (savedToken) {
                tokenInput.value = savedToken;
            }

            tokenInput.addEventListener('input', () => {
                localStorage.setItem('sammy_gh_token', tokenInput.value.trim());
                checkReady();
            });

            dropzone.addEventListener('click', () => fileInput.click());

            dropzone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropzone.style.background = 'rgba(243, 156, 18, 0.15)';
            });

            dropzone.addEventListener('dragleave', () => {
                dropzone.style.background = 'rgba(243, 156, 18, 0.05)';
            });

            dropzone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropzone.style.background = 'rgba(243, 156, 18, 0.05)';
                if (e.dataTransfer.files.length > 0) {
                    handleFiles(e.dataTransfer.files);
                }
            });

            fileInput.addEventListener('change', (e) => {
                if (e.target.files.length > 0) {
                    handleFiles(e.target.files);
                }
            });

            function handleFiles(files) {
                selectedFiles = Array.from(files).filter(file => file.type.startsWith('image/'));
                previewList.innerHTML = '';
                
                selectedFiles.forEach(file => {
                    const item = document.createElement('div');
                    item.className = 'preview-item';
                    item.innerHTML = `<span>${file.name}</span> <span>${(file.size / 1024 / 1024).toFixed(2)} MB</span>`;
                    previewList.appendChild(item);
                });

                checkReady();
            }

            function checkReady() {
                uploadBtn.disabled = !(tokenInput.value.trim().length > 0 && selectedFiles.length > 0);
            }

            function fileToBase64(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = () => resolve(reader.result.split(',')[1]);
                    reader.onerror = error => reject(error);
                });
            }

            uploadBtn.addEventListener('click', async () => {
                const token = tokenInput.value.trim();
                if (!token || selectedFiles.length === 0) return;

                uploadBtn.disabled = true;
                status.className = 'status-msg';
                status.style.display = 'none';

                let successCount = 0;
                let failCount = 0;

                for (let i = 0; i < selectedFiles.length; i++) {
                    const file = selectedFiles[i];
                    status.style.display = 'block';
                    status.className = 'status-msg';
                    status.innerText = `Lade hoch (${i + 1}/${selectedFiles.length}): ${file.name}...`;

                    try {
                        const content = await fileToBase64(file);
                        const cleanName = Date.now() + '_' + file.name.replace(/[^a-zA-Z0-9.-]/g, '_');
                        const url = `https://api.github.com/repos/${owner}/${repo}/contents/${folder}/${cleanName}`;

                        const res = await fetch(url, {
                            method: 'PUT',
                            headers: {
                                'Authorization': `token ${token}`,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                message: `Upload ${file.name} via Admin Panel`,
                                content: content
                            })
                        });

                        if (res.ok) {
                            successCount++;
                        } else {
                            failCount++;
                        }
                    } catch (err) {
                        failCount++;
                    }
                }

                if (failCount === 0) {
                    status.className = 'status-msg success';
                    status.innerText = `Erfolgreich ${successCount} Bild(er) hochgeladen!`;
                    selectedFiles = [];
                    previewList.innerHTML = '';
                    fileInput.value = '';
                } else {
                    status.className = 'status-msg error';
                    status.innerText = `${successCount} hochgeladen, ${failCount} fehlgeschlagen. Token überprüfen!`;
                }

                checkReady();
            });
        })();
    </script>
</body>
</html>
